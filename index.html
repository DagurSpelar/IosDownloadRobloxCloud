<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Download for iOS</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { margin: 0; display: grid; place-items: center; min-height: 100svh; background: #0f172a; color: #e2e8f0; }
    .card { background:#111827; padding: 2.5rem; border-radius: 1.25rem; box-shadow: 0 10px 30px rgba(0,0,0,.35); text-align: center; width:min(92vw,540px); }
    h1 { margin: 0 0 .75rem; font-size: clamp(1.25rem, 2.5vw + 1rem, 2rem); }
    p { opacity: .9; margin: 0 0 1.5rem; }
    a.button { display:inline-block; padding: .9rem 1.25rem; border-radius: .875rem; font-weight: 600; text-decoration: none; background:#2563eb; color:white; }
    a.button:active { transform: translateY(1px); }
    small { display:block; opacity:.7; margin-top:1rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1>iOS</h1>
    <p>Tap the button to install the profile on your iPhone or iPad.</p>
    <a class="button" href="./install.html" rel="nofollow">Install on iOS</a>
    <small>On iOS, Safari will prompt to allow the download, then you’ll finish in Settings.</small>
  </main>
</body>
</html>
